            top: 50%;

            height: 10px;

            border-radius: 50%;

            background: #E88B77;

            0% { opacity: 1; transform: translate(-50%, -50%) scale(0); }

        /* Responsive */

    <!-- =====================================================

    <div class="app-promo-overlay" id="app-promo-overlay" role="dialog" aria-modal="true" aria-label="アプリのご案内">
        <div class="app-promo-sheet" id="app-promo-sheet">
            <div class="app-promo-handle"></div>

            <div class="app-promo-badge">
                <span>🗺️</span>
                <span>Google マップ連携</span>
            </div>

            <h2 class="app-promo-title">アプリならもっと<span>スムーズ</span>に<br>お出かけできる！</h2>
            <p class="app-promo-sub">スポットが決まったら、ワンタップで<br>Google マップに移動できます。</p>

            <div class="app-promo-features">
                <div class="app-promo-feature">
                    <div class="app-promo-feature-icon">📍</div>
                    <div class="app-promo-feature-text">
                        <div class="app-promo-feature-title">Google マップに即ジャンプ</div>
                        <div class="app-promo-feature-desc">ルート・営業時間・口コミをすぐ確認。アプリ切り替え不要。</div>
                    </div>
                </div>
                <div class="app-promo-feature">
                    <div class="app-promo-feature-icon">⚡</div>
                    <div class="app-promo-feature-text">
                        <div class="app-promo-feature-title">サクサク動作</div>
                        <div class="app-promo-feature-desc">ネイティブアプリで読み込みが速い。外出先でもストレスなし。</div>
                    </div>
                </div>
                <div class="app-promo-feature">

                <span>📲</span>
                <span>無料アプリをインストール</span>

    <script>
        // AdSense広告の初期化
        (adsbygoogle = window.adsbygoogle || []).push({});

        // 404.htmlからのリダイレクト処理
        (function() {
            const redirect = sessionStorage.redirect;
            delete sessionStorage.redirect;
            if (redirect && redirect !== location.pathname) {
                history.replaceState(null, null, redirect);
            }
        })();

        // =====================================================
        // アプリ訴求ポップアップ制御
        // =====================================================
        const AppPromo = (() => {
            const STORAGE_KEY = 'app_promo_shown_count';
            const MAX_SHOW_COUNT = 3; // 合計3回まで表示

            // Android判定（WebViewは除く、Instagram内ブラウザは含む）
            function isAndroidBrowser() {
                const ua = navigator.userAgent;
                const isAndroid = /Android/i.test(ua);
                if (!isAndroid) return false;

                // 純粋なWebViewのみ除外（wv フラグ、かつInstagramでない）
                const isInstagram = /Instagram/i.test(ua);
                const isNativeWebView = /wv\b/.test(ua) && !isInstagram;

                return !isNativeWebView;
            }

            function getShowCount() {
                return parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
            }

            function incrementShowCount() {
                localStorage.setItem(STORAGE_KEY, String(getShowCount() + 1));
            }

            function shouldShow() {
                return isAndroidBrowser() && getShowCount() < MAX_SHOW_COUNT;
            }

            const overlay = document.getElementById('app-promo-overlay');

            function show() {
                if (!shouldShow()) return;
                // 次フレームで表示してCSSトランジションを効かせる
                requestAnimationFrame(() => {
                    overlay.classList.add('visible');
                });
                incrementShowCount();

                // GA4イベント
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'app_promo_shown', {
                        show_count: getShowCount()
                    });
                }
            }

            function hide() {
                overlay.classList.remove('visible');
            }

            // オーバーレイ背景タップで閉じる
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) hide();
            });

            // スワイプダウンで閉じる
            let touchStartY = 0;
            const sheet = document.getElementById('app-promo-sheet');
            sheet.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: true });
            sheet.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].clientY - touchStartY;
                if (diff > 60) hide(); // 60px以上下にスワイプで閉じる
            }, { passive: true });

            return { show, hide };
        })();

        // =====================================================
        // アクティビティデータベース
        // =====================================================
        let activities = [];

        const defaultActivities = [
            { location: "東京", place: "皇居東御苑", activity: "江戸城の歴史を感じながら散策", time: "2時間", point: "無料で入れる日本庭園の美しさ", season: "通年", people: "1人", category: "歴史・文化" },
            { location: "東京", place: "代々木公園", activity: "ピクニック", time: "半日", point: "都会のオアシスで自然を満喫", season: "春", people: "2人", category: "自然" },
            { location: "神奈川", place: "鎌倉", activity: "寺社巡り", time: "1日", point: "歴史と自然が融合した古都", season: "通年", people: "2人", category: "歴史・文化" },
            { location: "東京", place: "浅草", activity: "雷門から仲見世通りを散策", time: "2時間", point: "下町の風情と伝統工芸品", season: "通年", people: "2人", category: "歴史・文化" },
            { location: "神奈川", place: "江ノ島", activity: "海を見ながらカフェでのんびり", time: "半日", point: "湘南の海風を感じる癒しスポット", season: "夏", people: "2人", category: "自然" },
            { location: "東京", place: "上野公園", activity: "美術館巡り", time: "半日", point: "多彩な文化施設が集まるエリア", season: "通年", people: "1人", category: "歴史・文化" },
            { location: "千葉", place: "谷津干潟", activity: "バードウォッチング", time: "2時間", point: "都会の近くで野鳥観察", season: "春", people: "1人", category: "自然" },
            { location: "埼玉", place: "川越", activity: "蔵造りの街並み散策", time: "半日", point: "小江戸の雰囲気を楽しむ", season: "通年", people: "2人", category: "歴史・文化" },
            { location: "東京", place: "お台場", activity: "海浜公園で夕日鑑賞", time: "2時間", point: "東京湾の美しい夕景", season: "通年", people: "2人", category: "アミューズメント" },
            { location: "神奈川", place: "横浜赤レンガ倉庫", activity: "ショッピングとグルメ", time: "半日", point: "歴史的建造物でおしゃれな時間", season: "通年", people: "2人", category: "グルメ" },
            { location: "東京", place: "明治神宮", activity: "神社参拝と森林浴", time: "1時間", point: "都心の静寂なパワースポット", season: "通年", people: "1人", category: "歴史・文化" },
            { location: "千葉", place: "房総半島", activity: "海岸ドライブ", time: "1日", point: "太平洋の絶景を楽しむ", season: "夏", people: "2人", category: "自然" },
            { location: "埼玉", place: "秩父", activity: "温泉とグルメ", time: "1日", point: "自然豊かな癒しの温泉地", season: "冬", people: "2人", category: "宿泊・温泉" },
            { location: "東京", place: "東京タワー", activity: "展望台から夜景鑑賞", time: "2時間", point: "東京の象徴から見る絶景", season: "通年", people: "2人", category: "アミューズメント" },
            { location: "神奈川", place: "箱根", activity: "美術館巡りと温泉", time: "1日", point: "アートと自然の融合", season: "通年", people: "2人", category: "宿泊・温泉" },
            { location: "愛知", place: "名古屋城", activity: "金のシャチホコと天守閣見学", time: "2時間", point: "名古屋のシンボル的存在", season: "通年", people: "2人", category: "歴史・文化" },
            { location: "愛知", place: "熱田神宮", activity: "三種の神器を祀る神社参拝", time: "1時間", point: "伊勢神宮に次ぐ格式高い神社", season: "通年", people: "2人", category: "歴史・文化" },
            { location: "大阪", place: "大阪城", activity: "天守閣と歴史博物館見学", time: "2時間", point: "豊臣秀吉ゆかりの名城", season: "通年", people: "2人", category: "歴史・文化" },
            { location: "大阪", place: "道頓堀", activity: "たこ焼き・お好み焼き食べ歩き", time: "2時間", point: "大阪のグルメとネオンの街", season: "通年", people: "グループ", category: "グルメ" },
            { location: "福岡", place: "太宰府天満宮", activity: "学問の神様に参拝", time: "2時間", point: "菅原道真公を祀る由緒ある神社", season: "通年", people: "2人", category: "歴史・文化" },
            { location: "福岡", place: "福岡タワー", activity: "展望台から博多湾を一望", time: "1時間", point: "高さ234mの海浜タワー", season: "通年", people: "2人", category: "アミューズメント" }
        ];

        async function loadActivities() {
            try {
                const response = await fetch('./activities.json');
                if (response.ok || response.status === 304) {
                    const data = await response.json();
                    activities = data;
                    console.log(`✅ ${activities.length}件のアクティビティを読み込みました`);
                } else {
                    throw new Error('JSONファイルが見つかりません');
                }
            } catch (error) {
                console.log('ℹ️  activities.jsonが見つからないため、デフォルトデータを使用します');
                activities = defaultActivities;
            }
        }

        // DOM要素
        const decideBtn = document.getElementById('decide-btn');
        const mainCard = document.getElementById('main-card');
        const resetBtn = document.getElementById('reset-btn');
        const aiSearchBtn = document.getElementById('ai-search-btn');
        const loadingScreen = document.getElementById('loading-screen');

        const locationFilter = document.getElementById('location-filter');
        const categoryFilter = document.getElementById('category-filter');
        const timeFilter = document.getElementById('time-filter');
        const peopleFilter = document.getElementById('people-filter');
        const seasonFilter = document.getElementById('season-filter');

        const resultTitle = document.getElementById('result-title');
        const resultLocation = document.getElementById('result-location');
        const resultActivity = document.getElementById('result-activity');
        const resultPoint = document.getElementById('result-point');
        const resultTags = document.getElementById('result-tags');

        let currentResult = null;

        function updateCardHeight() {
            const card = document.getElementById('main-card');
            const frontFace = card.querySelector('.card-front');
            const backFace = card.querySelector('.card-back');
            if (card.classList.contains('flipped')) {
                card.style.height = backFace.offsetHeight + 'px';
            } else {
                card.style.height = frontFace.offsetHeight + 'px';
            }
        }

        async function initialize() {
            await loadActivities();
            loadingScreen.classList.add('hidden');
            updateCardHeight();
            window.addEventListener('resize', updateCardHeight);
        }

        // アプリ内かWebかを判定
        const isInApp = /wv|WebView/i.test(navigator.userAgent);

        if (isInApp) {
            aiSearchBtn.textContent = 'Google Mapで開く';
        } else {
            aiSearchBtn.textContent = 'AIで詳しく調べる';
        }

        aiSearchBtn.addEventListener('click', () => {
            if (!currentResult) return;

            if (isInApp) {
                const mapQuery = encodeURIComponent(`${currentResult.place} ${currentResult.location}`);
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapQuery}`;
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'google_map_click', {
                        spot_name: currentResult.place,
                        location: currentResult.location
                    });
                }
                window.location.href = mapUrl;
            } else {
                const searchQuery = `${currentResult.place}（${currentResult.location}）のアクセス方法とおすすめポイント`;
                const perplexityUrl = `https://www.perplexity.ai/search?q=${encodeURIComponent(searchQuery)}`;
                if (typeof gtag !== 'undefined') {
                    gtag('event', 'ai_search_click', {
                        spot_name: currentResult.place,
                        location: currentResult.location,
                        search_query: searchQuery
                    });
                }
                window.open(perplexityUrl, '_blank');
            }
        });

        const matchesSeason = (activitySeason, filterSeason) => {
            if (!filterSeason) return true;
            return activitySeason === filterSeason || activitySeason === '通年';
        };

        decideBtn.addEventListener('click', () => {
            const filters = {
                location: locationFilter.value,
                category: categoryFilter.value,
                time: timeFilter.value,
                people: peopleFilter.value,
                season: seasonFilter.value
            };

            if (typeof gtag !== 'undefined') {
                gtag('event', 'search_activity', {
                    location_filter: filters.location || '指定なし',
                    category_filter: filters.category || '指定なし',
                    time_filter: filters.time || '指定なし',
                    people_filter: filters.people || '指定なし',
                    season_filter: filters.season || '指定なし'
                });
            }

            let filtered = activities.filter(a =>
                (!filters.location || a.location === filters.location) &&
                (!filters.category || a.category === filters.category) &&
                (!filters.time || a.time === filters.time) &&
                (!filters.people || a.people === filters.people) &&
                matchesSeason(a.season, filters.season)
            );
            if (filtered.length === 0 && filters.people)
                filtered = activities.filter(a =>
                    (!filters.location || a.location === filters.location) &&
                    (!filters.category || a.category === filters.category) &&
                    (!filters.time || a.time === filters.time) &&
                    matchesSeason(a.season, filters.season)
                );
            if (filtered.length === 0 && filters.season)
                filtered = activities.filter(a =>
                    (!filters.location || a.location === filters.location) &&
                    (!filters.category || a.category === filters.category) &&
                    (!filters.time || a.time === filters.time)
                );
            if (filtered.length === 0 && filters.time)
                filtered = activities.filter(a =>
                    (!filters.location || a.location === filters.location) &&
                    (!filters.category || a.category === filters.category)
                );
            if (filtered.length === 0 && filters.category)
                filtered = activities.filter(a => !filters.location || a.location === filters.location);
            if (filtered.length === 0)
                filtered = activities;

            const selected = filtered[Math.floor(Math.random() * filtered.length)];
            if (typeof gtag !== 'undefined') {
                gtag('event', 'spot_selected', {
                    spot_name: selected.place,
                    location: selected.location,
                    category: selected.category
                });
            }
            displayResult(selected);

            decideBtn.disabled = true;
            decideBtn.textContent = '決定中...';
            setTimeout(() => {
                mainCard.classList.add('flipped');
                decideBtn.disabled = false;
                decideBtn.textContent = '決める';
                setTimeout(updateCardHeight, 50);
            }, 600);
        });

        function getCategoryIcon(category) {
            const icons = {
                '自然': '🌿', '歴史・文化': '🏛️',
                'スポーツ・レクリエーション': '⚽', 'アミューズメント': '🎡',
                '宿泊・温泉': '♨️', 'グルメ': '🍴'
            };
            return icons[category] || '📍';
        }

        function displayResult(activity) {
            currentResult = activity;
            resultTitle.textContent = activity.place;
            resultLocation.textContent = `📍 ${activity.location}`;
            resultActivity.textContent = activity.activity;
            resultPoint.textContent = activity.point;
            resultTags.innerHTML = `
                <span class="tag">⏱️ ${activity.time}</span>
                <span class="tag">👥 ${activity.people}</span>
                <span class="tag">🌸 ${activity.season}</span>
                <span class="tag">${getCategoryIcon(activity.category)} ${activity.category}</span>
            `;
        }

        // =====================================================
        // もう一度選ぶ ボタン — Androidならポップアップ挟む
        // =====================================================
        resetBtn.addEventListener('click', () => {
            if (typeof gtag !== 'undefined') {
                gtag('event', 'reset_click', {
                    previous_spot: currentResult ? currentResult.place : 'unknown'
                });
            }

            // Androidブラウザ且つ表示上限未達なら訴求を挟む
            AppPromo.show();

            mainCard.classList.remove('flipped');
            setTimeout(updateCardHeight, 50);
        });

        // ポップアップのCTAボタン（実際のストアURLに変更してください）
        document.getElementById('app-promo-cta-btn').addEventListener('click', () => {
            if (typeof gtag !== 'undefined') {
                gtag('event', 'app_promo_cta_click', {
                    platform: 'android'
                });
            }
            // ▼ Google Play ストアのURLに変更してください
            window.open('https://play.google.com/store/apps/details?id=YOUR_APP_ID', '_blank');
            AppPromo.hide();
        });

        // スキップボタン
        document.getElementById('app-promo-skip-btn').addEventListener('click', () => {
            if (typeof gtag !== 'undefined') {
                gtag('event', 'app_promo_skip', {
                    platform: 'android'
                });
            }
            AppPromo.hide();
        });

        initialize();
    </script>
